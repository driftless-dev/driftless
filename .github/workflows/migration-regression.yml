name: migration-regression

# Guards the core value of the project: that a known model regression can still
# be repaired back to passing quality. The deterministic job runs on every change
# (no secrets); the live job exercises the real LLM optimizer on a schedule.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * *"  # nightly live optimizer eval
  workflow_dispatch:

jobs:
  deterministic:
    name: deterministic engine regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run deterministic migration regression
        run: pytest tests/test_migration_regression.py -v --no-cov

  live-eval:
    name: live optimizer quality eval
    runs-on: ubuntu-latest
    # Nondeterministic + costs tokens: only on schedule or manual dispatch.
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,llm]"
      - name: Run live optimizer eval
        # Self-skips if the secret is absent, so this never hard-fails on forks.
        env:
          MM_LIVE_EVAL: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pytest tests/test_migration_live.py -v --no-cov
