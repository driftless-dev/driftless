name: Refresh model catalog

# Scheduled maintenance for the model lifecycle catalog (P1.1). Normalizes the
# committed file, optionally merges new model IDs from provider /models APIs
# (when repo secrets are set), refreshes pricing from LiteLLM's public table,
# or a manual updates_url, then opens a PR when the catalog changes.

on:
  schedule:
    - cron: "0 12 * * 1" # Mondays 12:00 UTC
  workflow_dispatch:
    inputs:
      updates_url:
        description: "Optional URL to a JSON array of model entries to merge"
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch catalog updates
        id: fetch
        run: |
          merge_updates() {
            python - <<'PY'
          import json
          from pathlib import Path
          parts = []
          for name in ("model_updates.json", "pricing_updates.json"):
              p = Path(name)
              if p.is_file():
                  parts.extend(json.loads(p.read_text(encoding="utf-8") or "[]"))
          Path("updates.json").write_text(json.dumps(parts, indent=2) + "\n", encoding="utf-8")
          print(f"merged {len(parts)} update(s)")
          PY
          }
          if [ -n "${{ github.event.inputs.updates_url }}" ]; then
            curl -fsSL "${{ github.event.inputs.updates_url }}" -o updates.json
          else
            echo '[]' > model_updates.json
            if [ -n "${{ secrets.OPENAI_API_KEY }}" ] || [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
              python tools/fetch_provider_models.py \
                --provider openai --provider anthropic \
                --catalog src/driftless/data/model_lifecycle.json \
                -o model_updates.json || echo '[]' > model_updates.json
            fi
            python tools/fetch_provider_pricing.py --source litellm \
              --provider openai --provider anthropic \
              --catalog src/driftless/data/model_lifecycle.json \
              -o pricing_updates.json || echo '[]' > pricing_updates.json
            merge_updates
          fi
          if python -c "import json; raise SystemExit(0 if json.load(open('updates.json')) else 1)"; then
            echo "updates=--updates updates.json" >> "$GITHUB_OUTPUT"
          else
            echo "updates=" >> "$GITHUB_OUTPUT"
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Normalize / merge catalog
        run: |
          python tools/refresh_catalog.py --write ${{ steps.fetch.outputs.updates }} \
            --stamp-date "$(date -u +%F)"
          python tools/refresh_catalog.py --validate

      - name: Open PR if the catalog changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(catalog): refresh model lifecycle data"
          title: "chore(catalog): refresh model lifecycle data"
          body: |
            Automated model catalog refresh.

            Review the diff for status/pricing/lifecycle changes before merging.
          branch: chore/refresh-catalog
          delete-branch: true
          add-paths: |
            src/driftless/data/model_lifecycle.json
