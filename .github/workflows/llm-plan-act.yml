name: LLM plan (deprecation triage)

# Scheduled policy triage: discover at-risk model dependencies and migrate +
# open PRs/issues for every actionable trigger (plan --act).
#
# Scheduled runs are dry-run (--act); use workflow_dispatch with create=true to
# open real PRs/issues. Requires driftless.yml + optional .driftless/policy.yml.
# Run `driftless init-ci --plan` to scaffold the same workflow for your project.
on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      create:
        description: Open PRs/issues (not just preview)
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Plan and act on migration triggers
        uses: driftless-dev/driftless@v0.2.14
        with:
          command: plan
          args: >-
            --act${{ github.event_name == 'workflow_dispatch' && inputs.create && ' --create' || '' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
