name: LLM prompt refine (dataset change)

# Re-optimize a prompt when its eval dataset changes (new labeled data, e.g. from
# customer feedback). The model stays pinned to model.current; only the prompt is
# tuned toward the new data, validated on a holdout, and proposed via PR with a
# fresh suggested `thresholds:` block.
#
# Point the `paths:` filter at your workflow's eval dataset (eval.labels_path /
# run.input_path in driftless.yml). When those files change on main, refine runs
# and opens a PR.
on:
  push:
    branches: [main]
    paths:
      - "data/labels.jsonl"
      - "data/inputs.jsonl"
  workflow_dispatch:
    inputs:
      workflow:
        description: "Workflow name from driftless.yml"
        required: true

permissions:
  contents: write
  pull-requests: write

env:
  WORKFLOW: ${{ github.event.inputs.workflow || 'support_classifier' }}

jobs:
  refine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Refine prompt toward the updated dataset
        uses: driftless-dev/driftless@v0.2.1
        with:
          command: refine
          workflow: ${{ env.WORKFLOW }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Open refine PR
        uses: driftless-dev/driftless@v0.2.1
        with:
          command: open-pr
          workflow: ${{ env.WORKFLOW }}
          args: "--create"
