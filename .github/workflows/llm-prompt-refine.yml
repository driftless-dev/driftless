name: LLM prompt refine (dataset change)

# Re-optimize a prompt when its eval dataset changes (new labeled data, e.g. from
# customer feedback). The model stays pinned to model.current; only the prompt is
# tuned toward the new data, validated on a holdout, and proposed via PR with a
# fresh suggested `thresholds:` block.
#
# This is the in-repo MVP: git is the change detector. Point the `paths:` filter
# at your workflow's eval dataset (eval.labels_path / run.input_path in
# driftless.yml). When those files change on main, refine runs and opens a PR.
on:
  push:
    branches: [main]
    paths:
      # Replace with your workflow's dataset paths (eval.labels_path,
      # run.input_path). Keep this strictly on dataset files so a refine PR's
      # prompt edits can't re-trigger this workflow.
      - "data/labels.jsonl"
      - "data/inputs.jsonl"
  workflow_dispatch:
    inputs:
      workflow:
        description: "Workflow name from driftless.yml"
        required: true

permissions:
  contents: write
  pull-requests: write

env:
  # The workflow under test; for `push` set your workflow name here.
  WORKFLOW: ${{ github.event.inputs.workflow || 'support_classifier' }}

jobs:
  refine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Refine prompt toward the updated dataset
        uses: ./ # replace with driftless/action@v1 once published
        with:
          command: refine
          workflow: ${{ env.WORKFLOW }}
        env:
          # Provide the provider API key(s) your workflow needs to run, plus the
          # key for the repair generator (defaults to the same provider).
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Open refine PR
        uses: ./
        with:
          command: open-pr
          workflow: ${{ env.WORKFLOW }}
          args: "--create"
