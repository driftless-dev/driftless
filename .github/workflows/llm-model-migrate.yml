name: LLM model migration

# Manually triggered migration: runs the workflow under the target model,
# repairs prompts/configs where allowed, validates on holdout, and opens a PR
# (or an issue if the migration is blocked).
on:
  workflow_dispatch:
    inputs:
      workflow:
        description: "Workflow name from driftless.yml"
        required: true
      to:
        description: "Target model"
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Attempt migration
        uses: driftless-dev/driftless@v0.2.8
        with:
          command: migrate
          workflow: ${{ github.event.inputs.workflow }}
          to: ${{ github.event.inputs.to }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Open migration PR (or issue)
        uses: driftless-dev/driftless@v0.2.8
        with:
          command: open-pr
          workflow: ${{ github.event.inputs.workflow }}
          args: "--create"
